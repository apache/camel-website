name: Pull request checks

on: pull_request

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CAMEL_ENV: production
  HUGO_OPTIONS: '--buildFuture'

jobs:
  detect-drafts:
    runs-on: ubuntu-latest
    outputs:
      drafts-only: ${{ steps.check.outputs.drafts-only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Check if PR only changes draft blog posts
        id: check
        run: |
          CHANGED=$(gh pr diff ${{ github.event.pull_request.number }} --name-only)
          DRAFTS_ONLY=true
          for file in $CHANGED; do
            case "$file" in
              content/blog/*/index.md)
                if ! grep -q '^draft: true' "$file" 2>/dev/null; then
                  DRAFTS_ONLY=false
                  break
                fi
                ;;
              content/blog/*)
                # assets (images, SVGs) alongside a draft post are fine
                dir=$(dirname "$file")
                index="$dir/index.md"
                if [ ! -f "$index" ] || ! grep -q '^draft: true' "$index" 2>/dev/null; then
                  DRAFTS_ONLY=false
                  break
                fi
                ;;
              *)
                DRAFTS_ONLY=false
                break
                ;;
            esac
          done
          echo "drafts-only=$DRAFTS_ONLY" >> "$GITHUB_OUTPUT"
          echo "Drafts only: $DRAFTS_ONLY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  checks:
    needs: detect-drafts
    if: needs.detect-drafts.outputs.drafts-only != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install dependencies
        run: yarn workspaces foreach --all install
      - name: Check cache
        run: yarn check:dependencies
      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn build-all
      - name: Run checks
        run: yarn checks
      - name: Store pull request data
        run: |
          mkdir pull_request
          echo ${{ github.event.pull_request.number }} > ./pull_request/number
      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: website
          path: |
            public
            pull_request
